x-common-env: &common-env
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  SCHEMA_REGISTRY_URL: http://schema-registry:8081
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
  S3A_ENDPOINT: http://minio:9000
  MONGO_URI: mongodb://mongodb:27017
  MONGO_DB: ${MONGO_DB:-social_db}
  MONGO_COLLECTION: ${MONGO_COLLECTION:-posts_clean}

services:

  # ── Infrastructure: Kafka ──────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zk_data:/var/lib/zookeeper/data
      - zk_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        echo "Creating Kafka topics..."
        sleep 10

        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic social-raw-batch --partitions 3 --replication-factor 1

        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic social-raw-realtime --partitions 3 --replication-factor 1

        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic social-processed --partitions 3 --replication-factor 1

        echo "=== Topics created ==="
        kafka-topics --bootstrap-server kafka:29092 --list
    restart: "no"

  # ── Infrastructure: MinIO ─────────────────────────────────────────────────

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin}
      mc mb --ignore-existing local/social-raw
      mc mb --ignore-existing local/social-clean
      echo '=== MinIO buckets: social-raw, social-clean ==='
      mc ls local
      "
    restart: "no"

  # ── Infrastructure: MongoDB ───────────────────────────────────────────────

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-social_db}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Spark Cluster ──────────────────────────────────────────────────────────

  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: social-spark-master:3.5.3
    container_name: spark-master
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      minio:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      - SPARK_NO_DAEMONIZE=true
    volumes:
      - ./streaming:/app/streaming
      - ./batch:/app/batch
      - ./shared:/app/shared
      - ./ingestion/schema:/app/ingestion/schema
      - spark_master_data:/opt/spark/work
      - ./:/opt/spark-apps
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 10
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]

  spark-worker-1:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: social-spark-worker:3.5.3
    container_name: spark-worker-1
    depends_on:
      - spark-master
    ports:
      - "8083:8081"
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2G
    volumes:
      - ./streaming:/app/streaming
      - ./batch:/app/batch
      - ./shared:/app/shared
      - ./ingestion/schema:/app/ingestion/schema
      - spark_worker_1_data:/opt/spark/work
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]

  # ── Application: Ingestion ────────────────────────────────────────────────

  ingestion:
    build:
      context: .
      dockerfile: Dockerfile
    image: social-python:latest
    container_name: ingestion
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
    environment:
      <<: *common-env
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data:ro
    command: ["python", "-m", "ingestion.main"]
    restart: on-failure

  # ── Application: Streaming ────────────────────────────────────────────────

  streaming:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: social-spark-streaming:3.5.3
    container_name: streaming
    depends_on:
      spark-master:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *common-env
      SPARK_MASTER: spark://spark-master:7077
      OUTPUT_DIR: /tmp/streaming-output
      CHECKPOINT_DIR: /tmp/spark-checkpoints
    volumes:
      - ./streaming:/app/streaming
      - ./shared:/app/shared
      - ./ingestion/schema:/app/ingestion/schema
      - streaming_output:/tmp/streaming-output
      - streaming_checkpoints:/tmp/spark-checkpoints
    command: >
      /opt/spark/bin/spark-submit
        --master spark://spark-master:7077
        --deploy-mode client
        --driver-memory 2g
        --executor-memory 2g
        --executor-cores 1
        /app/streaming/main.py
    restart: on-failure

  # ── Application: Batch Consumer (Kafka → MinIO) ───────────────────────────

  batch-consumer:
    build:
      context: .
      dockerfile: Dockerfile
    image: social-python:latest
    container_name: batch-consumer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
    environment:
      <<: *common-env
      KAFKA_CONSUMER_GROUP: batch-consumer-group
      CONSUMER_FLUSH_SIZE: ${CONSUMER_FLUSH_SIZE:-1000}
      CONSUMER_FLUSH_INTERVAL: ${CONSUMER_FLUSH_INTERVAL:-60}
    command: ["python", "-m", "batch.consumer.kafka_to_minio"]
    restart: unless-stopped

  # ── Application: Airflow (Batch Orchestration) ────────────────────────────

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 10

  airflow-init:
    image: apache/airflow:2.9.3
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MONGO_URI: mongodb://mongodb:27017
    entrypoint: ["/bin/bash", "-c"]
    command: >
      bash -c "
      pip install --no-cache-dir minio pymongo &&
      airflow db migrate &&
      airflow users create \
        --username admin --password admin \
        --firstname Admin --lastname User \
        --role Admin --email admin@example.com || true
      "
    restart: "no"

  airflow-webserver:
    image: apache/airflow:2.9.3
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8085:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MONGO_URI: mongodb://mongodb:27017
    volumes:
      - ./batch/etl:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 10

  airflow-scheduler:
    image: apache/airflow:2.9.3
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MONGO_URI: mongodb://mongodb:27017
      SPARK_HOME: /opt/spark
      PIPELINE_DIR: /opt/social_pipeline
    volumes:
      - ./batch/etl:/opt/airflow/dags
      - ./:/opt/social_pipeline:ro
      - airflow_logs:/opt/airflow/logs
    command: scheduler

volumes:
  zk_data:
  zk_log:
  kafka_data:
  minio_data:
  mongo_data:
  postgres_data:
  spark_master_data:
  spark_worker_1_data:
  streaming_output:
  streaming_checkpoints:
  airflow_logs:
